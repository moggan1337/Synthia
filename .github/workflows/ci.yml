name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov
        continue-on-error: true
      - name: Lint
        run: pip install ruff && ruff check .
        continue-on-error: true
      - name: Test
        run: pytest
        continue-on-error: true
